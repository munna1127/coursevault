name: coursevault
description: "CourseVault - A dedicated course viewer for StudyRatna."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # Material Icons + Cupertino
  cupertino_icons: ^1.0.8

  # WebView (official) — Chromium/Android System WebView backed
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.1.0

  # Connectivity detection for offline mode
  connectivity_plus: ^6.1.0

  # App package info (for version display in Settings)
  package_info_plus: ^8.1.0

  # For opening the Privacy Policy in the external browser
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Generates Android launcher icons from a single source image
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
